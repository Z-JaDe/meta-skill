<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <style>
      /* 外圈旋转动画 */
      .rotate-ring {
        transform-origin: 250px 250px;
        animation: rotate 20s linear infinite;
      }
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      /* 节点脉冲动画 */
      .pulse-node {
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }
      
      /* 电路节点闪烁 */
      .circuit-dot {
        animation: blink 1.5s ease-in-out infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; r: 4; }
        50% { opacity: 0.4; r: 3; }
      }
      
      /* 外轮廓呼吸光晕 */
      .brain-outline {
        animation: breathe 3s ease-in-out infinite;
      }
      @keyframes breathe {
        0%, 100% { stroke-opacity: 1; }
        50% { stroke-opacity: 0.5; }
      }
      
      /* 左脑纹理 - 多重动画组合 */
      .left-texture {
        animation: textureGlow 2s ease-in-out infinite alternate;
      }
      @keyframes textureGlow {
        0% { stroke-opacity: 0.6; stroke-width: 2; }
        100% { stroke-opacity: 1; stroke-width: 3.5; }
      }
      
      /* 左脑纹理流动效果 - 每条线独立动画 */
      .texture-line-1 { animation: flow1 3s ease-in-out infinite; animation-delay: 0s; }
      .texture-line-2 { animation: flow2 3s ease-in-out infinite; animation-delay: 0.3s; }
      .texture-line-3 { animation: flow3 3s ease-in-out infinite; animation-delay: 0.6s; }
      .texture-line-4 { animation: flow4 3s ease-in-out infinite; animation-delay: 0.9s; }
      .texture-line-5 { animation: flow5 3s ease-in-out infinite; animation-delay: 1.2s; }
      
      @keyframes flow1 {
        0%, 100% { d: path("M -70 -40 C -50 -45 -40 -40 -50 -30"); stroke-opacity: 0.5; }
        50% { d: path("M -70 -40 C -50 -45 -40 -40 -48 -28"); stroke-opacity: 1; }
      }
      @keyframes flow2 {
        0%, 100% { d: path("M -75 -15 C -50 -20 -35 -10 -45 0"); stroke-opacity: 0.5; }
        50% { d: path("M -75 -15 C -50 -20 -35 -10 -43 2"); stroke-opacity: 1; }
      }
      @keyframes flow3 {
        0%, 100% { d: path("M -75 10 C -45 -5 -30 10 -40 25"); stroke-opacity: 0.5; }
        50% { d: path("M -75 10 C -45 -5 -30 10 -38 27"); stroke-opacity: 1; }
      }
      @keyframes flow4 {
        0%, 100% { d: path("M -70 35 C -45 25 -25 35 -30 50"); stroke-opacity: 0.5; }
        50% { d: path("M -70 35 C -45 25 -25 35 -28 52"); stroke-opacity: 1; }
      }
      @keyframes flow5 {
        0%, 100% { d: path("M -55 55 C -40 50 -25 55 -20 65"); stroke-opacity: 0.5; }
        50% { d: path("M -55 55 C -40 50 -25 55 -18 67"); stroke-opacity: 1; }
      }
      
      /* 右半球电路流动 */
      .circuit-flow {
        animation: circuitPulse 2s linear infinite;
      }
      @keyframes circuitPulse {
        0% { stroke-dashoffset: 100; }
        100% { stroke-dashoffset: 0; }
      }
      
      /* 中线脉冲 */
      .mid-line {
        animation: midPulse 2.5s ease-in-out infinite;
      }
      @keyframes midPulse {
        0%, 100% { stroke-opacity: 0.4; }
        50% { stroke-opacity: 1; }
      }
    </style>
  </defs>
  
  <!-- 背景 -->
  <rect width="500" height="500" fill="#0F172A"/>
  
  <!-- 外圈虚线环 - 旋转动画 -->
  <circle class="rotate-ring" cx="250" cy="250" r="160" fill="none" stroke="#1E3A8A" stroke-width="2" stroke-dasharray="6 6"/>
  
  <!-- 中心大脑 -->
  <g transform="translate(250, 250)" filter="url(#glow)">
    <!-- 大脑外轮廓 - 呼吸光晕 -->
    <path class="brain-outline" d="M -50 -60 
             C -80 -60 -95 -30 -95 0 
             C -95 50 -60 75 -25 75 
             C -10 75 0 65 0 50
             C 0 65 10 75 25 75 
             C 60 75 95 50 95 0 
             C 95 -30 80 -60 50 -60
             C 35 -60 25 -50 25 -35
             C 25 -50 15 -60 0 -60
             C -15 -60 -25 -50 -25 -35
             C -25 -50 -35 -60 -50 -60 Z" 
          fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- 中线分隔 - 脉冲动画 -->
    <path class="mid-line" d="M 0 -55 C 0 -40 -5 -30 0 -15 C 5 0 0 15 0 30 C 0 50 0 65 0 72" 
          fill="none" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
    
    <!-- 左半球 - 生物纹理 (白色) - 每条线独立流动动画 -->
    <g class="left-texture" fill="none" stroke="#FFFFFF" stroke-linecap="round">
      <path class="texture-line-1" stroke-width="2.5" d="M -70 -40 C -50 -45 -40 -40 -50 -30"/>
      <path class="texture-line-2" stroke-width="2.5" d="M -75 -15 C -50 -20 -35 -10 -45 0"/>
      <path class="texture-line-3" stroke-width="2.5" d="M -75 10 C -45 -5 -30 10 -40 25"/>
      <path class="texture-line-4" stroke-width="2.5" d="M -70 35 C -45 25 -25 35 -30 50"/>
      <path class="texture-line-5" stroke-width="2.5" d="M -55 55 C -40 50 -25 55 -20 65"/>
    </g>
    
    <!-- 右半球 - 电路纹理 (蓝色) - 流动动画 -->
    <g fill="none" stroke="#60A5FA" stroke-width="2" stroke-linecap="round" stroke-dasharray="30 10" class="circuit-flow">
      <path d="M 35 -35 L 65 -35"/>
      <path d="M 35 -10 L 70 -10"/>
      <path d="M 35 15 L 70 15"/>
      <path d="M 35 40 L 65 40"/>
    </g>
    
    <!-- 电路节点 - 闪烁动画 -->
    <circle class="circuit-dot" cx="65" cy="-35" r="4" fill="#60A5FA"/>
    <circle class="circuit-dot" cx="70" cy="-10" r="4" fill="#60A5FA"/>
    <circle class="circuit-dot" cx="70" cy="15" r="4" fill="#60A5FA"/>
    <circle class="circuit-dot" cx="65" cy="40" r="4" fill="#60A5FA"/>
    
    <!-- 电路连接线 -->
    <path d="M 15 -20 L 35 -35"/>
    <path d="M 15 5 L 35 -10"/>
    <path d="M 15 30 L 35 40"/>
  </g>
  
  <!-- 8 个节点 - 精确对齐圆环 (半径 160) - 脉冲动画 -->
  <!-- 节点 1: TDD (0° - 顶部) -->
  <g class="pulse-node" transform="translate(250, 90)" style="animation-delay: 0s;">
    <circle r="28" fill="#1E3A8A" stroke="#3B82F6" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold" fill="#FFFFFF">TDD</text>
  </g>
  
  <!-- 节点 2: Anti-Rationalization (45°) -->
  <g class="pulse-node" transform="translate(363.14, 136.86)" style="animation-delay: 0.25s;">
    <circle r="28" fill="#1E3A8A" stroke="#3B82F6" stroke-width="2"/>
    <g stroke="#60A5FA" stroke-width="2" fill="none" stroke-linecap="round">
      <line x1="-10" y1="8" x2="-10" y2="-8"/>
      <line x1="0" y1="8" x2="0" y2="-12"/>
      <line x1="10" y1="8" x2="10" y2="-6"/>
      <line x1="-12" y1="8" x2="12" y2="8"/>
    </g>
  </g>
  
  <!-- 节点 3: Blind Comparison (90° - 右侧) -->
  <g class="pulse-node" transform="translate(410, 250)" style="animation-delay: 0.5s;">
    <circle r="28" fill="#1E3A8A" stroke="#3B82F6" stroke-width="2"/>
    <g stroke="#60A5FA" stroke-width="2" fill="none">
      <rect x="-12" y="-10" width="24" height="20" rx="2"/>
      <line x1="-8" y1="-3" x2="8" y2="-3"/>
      <line x1="-8" y1="3" x2="8" y2="3"/>
    </g>
  </g>
  
  <!-- 节点 4: Redundancy Removal (135°) -->
  <g class="pulse-node" transform="translate(363.14, 363.14)" style="animation-delay: 0.75s;">
    <circle r="28" fill="#1E3A8A" stroke="#3B82F6" stroke-width="2"/>
    <g stroke="#60A5FA" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M 0 -12 C 6 -12 12 -6 12 0 C 12 10 0 18 0 18 C 0 18 -12 10 -12 0 C -12 -6 -6 -12 0 -12"/>
      <circle cx="0" cy="-2" r="3"/>
      <line x1="-6" y1="14" x2="6" y2="2"/>
      <line x1="6" y1="14" x2="-6" y2="2"/>
    </g>
  </g>
  
  <!-- 节点 5: Ambiguity Clarification (180° - 底部) -->
  <g class="pulse-node" transform="translate(250, 410)" style="animation-delay: 1s;">
    <circle r="28" fill="#1E3A8A" stroke="#3B82F6" stroke-width="2"/>
    <g stroke="#60A5FA" stroke-width="1.5" fill="none">
      <circle cx="-6" cy="-6" r="3"/>
      <circle cx="6" cy="-6" r="3"/>
      <circle cx="-6" cy="6" r="3"/>
      <circle cx="6" cy="6" r="3"/>
      <circle cx="0" cy="0" r="5"/>
    </g>
  </g>
  
  <!-- 节点 6: Progressive Disclosure (225°) -->
  <g class="pulse-node" transform="translate(136.86, 363.14)" style="animation-delay: 1.25s;">
    <circle r="28" fill="#1E3A8A" stroke="#3B82F6" stroke-width="2"/>
    <g stroke="#60A5FA" stroke-width="2" fill="none" stroke-linecap="round">
      <rect x="-10" y="-8" width="20" height="16" rx="2"/>
      <path d="M -10 -8 L 0 0 L 10 -8"/>
      <line x1="14" y1="-4" x2="18" y2="-4"/>
      <line x1="14" y1="0" x2="20" y2="0"/>
      <line x1="14" y1="4" x2="18" y2="4"/>
    </g>
  </g>
  
  <!-- 节点 7: Integrity (270° - 左侧) -->
  <g class="pulse-node" transform="translate(90, 250)" style="animation-delay: 1.5s;">
    <circle r="28" fill="#1E3A8A" stroke="#3B82F6" stroke-width="2"/>
    <g stroke="#60A5FA" stroke-width="2" fill="none" stroke-linecap="round">
      <path d="M 0 -16 L 12 -8 L 12 8 L 0 16 L -12 8 L -12 -8 Z"/>
      <path d="M -5 0 L -2 6 L 6 -4"/>
    </g>
  </g>
  
  <!-- 节点 8: Cycle Arrow (315°) - 持续旋转 -->
  <g transform="translate(136.86, 136.86)">
    <circle r="28" fill="#1E3A8A" stroke="#3B82F6" stroke-width="2"/>
    <g transform="rotate(0 0 0)">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="4s" repeatCount="indefinite"/>
      <path d="M -8 8 A 12 12 0 1 1 8 8" stroke="#60A5FA" stroke-width="2" fill="none" stroke-linecap="round"/>
      <polygon points="8,8 4,12 6,8" fill="#60A5FA"/>
    </g>
  </g>
</svg>
